version: 2

updates:
  # ─── Frontend (npm) ────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    # Group all minor and patch updates into a single PR to reduce noise
    groups:
      frontend-minor-patch:
        update-types:
          - "minor"
          - "patch"
    # Always open individual PRs for major version bumps — they may be breaking
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"

  # ─── Backend (Maven) ───────────────────────────────────────────────────────
  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      backend-minor-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"

  # ─── Docker base images ────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"