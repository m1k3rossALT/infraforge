# ─── Development profile ───────────────────────────────────────────────────
spring:
  application:
    name: infraforge-dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://db:5432/infraforge}
    username: ${DB_USERNAME:infraforge}
    password: ${DB_PASSWORD:infraforge}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    com.infraforge: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers
  endpoint:
    health:
      show-details: always