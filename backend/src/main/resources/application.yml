server:
  port: 8080
  shutdown: graceful
  tomcat:
    max-http-form-post-size: 2MB

spring:
  application:
    name: infraforge
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  lifecycle:
    timeout-per-shutdown-phase: 20s
  freemarker:
    template-loader-path: classpath:/
    suffix: ""
    charset: UTF-8
    settings:
      output_format: PlainTextOutputFormat
  servlet:
    multipart:
      max-request-size: 2MB
      max-file-size: 2MB

# CORS allowed origins — override via environment variable in production
# e.g. INFRAFORGE_CORS_ORIGINS=https://myapp.example.com
infraforge:
  cors:
    allowed-origins: ${INFRAFORGE_CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
  jwt:
    # Must be at least 32 characters. Override via INFRAFORGE_JWT_SECRET in production.
    secret: ${INFRAFORGE_JWT_SECRET:dev-secret-change-this-in-production-must-be-32-chars}
    access-token-expiry-ms: ${INFRAFORGE_JWT_ACCESS_EXPIRY_MS:900000}   # 15 minutes
    refresh-token-expiry-days: ${INFRAFORGE_JWT_REFRESH_EXPIRY_DAYS:7}
  ai:
    # AES-256 key for encrypting stored API keys. Must be exactly 32 characters.
    # Override via INFRAFORGE_AI_ENCRYPTION_KEY in production.
    # IMPORTANT: changing this key invalidates all stored encrypted API keys —
    # users will need to re-enter their keys. Rotate carefully.
    encryption-key: ${INFRAFORGE_AI_ENCRYPTION_KEY:dev-ai-enc-key-change-in-prod!!!}
    # Rate limit: max suggest requests per user per minute
    rate-limit-per-minute: ${INFRAFORGE_AI_RATE_LIMIT:10}

# Actuator base config — profile configs extend this
management:
  endpoints:
    web:
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: WARN