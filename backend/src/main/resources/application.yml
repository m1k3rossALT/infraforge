server:
  port: 8080

spring:
  freemarker:
    # Disable the default /templates prefix — we manage paths ourselves
    template-loader-path: classpath:/
    suffix: ""
    charset: UTF-8
    # Disable auto-escaping — we're generating code, not HTML
    settings:
      output_format: PlainTextOutputFormat

logging:
  level:
    com.infraforge: DEBUG
