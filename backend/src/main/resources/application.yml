server:
  port: 8080
  shutdown: graceful
  tomcat:
    max-http-form-post-size: 2MB

spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s
  freemarker:
    template-loader-path: classpath:/
    suffix: ""
    charset: UTF-8
    settings:
      output_format: PlainTextOutputFormat
  servlet:
    multipart:
      max-request-size: 2MB
      max-file-size: 2MB

# CORS allowed origins — override via environment variable in production
# e.g. INFRAFORGE_CORS_ORIGINS=https://myapp.example.com
infraforge:
  cors:
    allowed-origins: ${INFRAFORGE_CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

logging:
  level:
    com.infraforge: DEBUG
