# ─── Production profile ────────────────────────────────────────────────────
spring:
  application:
    name: infraforge
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

logging:
  level:
    com.infraforge: INFO
    org.springframework: WARN

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never

# ─── AI (Phase 4) ──────────────────────────────────────────────────────────
# Required environment variables for production AI support:
#
#   INFRAFORGE_AI_ENCRYPTION_KEY  — exactly 32 characters, random, kept secret
#                                   generate with: openssl rand -base64 24 | head -c 32
#
# Optional overrides (defaults defined in application.yml):
#   INFRAFORGE_AI_RATE_LIMIT      — suggest requests per user per minute (default: 10)
#
# Phase 6 note: when platform-managed AI is added, add INFRAFORGE_AI_PLATFORM_KEY here.